<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자동 시나리오 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#09090b;color:#f0f1f4;padding:1.5rem}
h1{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}
.sub{font-size:.8rem;color:#636b82;margin-bottom:1.5rem}
.test-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem}
.test-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#16181f;border:1px solid #2a2e3a;border-radius:8px;font-size:.82rem;transition:all .2s}
.test-row.pass{border-color:#34c77b;background:rgba(52,199,123,.06)}
.test-row.fail{border-color:#ef5050;background:rgba(239,80,80,.06)}
.test-row.running{border-color:#4b8df8;background:rgba(75,141,248,.06)}
.test-row .icon{font-size:1rem;width:22px;text-align:center}
.test-row .name{flex:1;font-weight:600}
.test-row .detail{font-size:.72rem;color:#a0a6b8;max-width:50%}
.test-row.fail .detail{color:#ef5050}
.summary{padding:12px 16px;background:#1c1f28;border-radius:10px;font-size:.85rem;font-weight:700;display:flex;gap:1.5rem;align-items:center}
.summary .pass-c{color:#34c77b}
.summary .fail-c{color:#ef5050}
.summary .time-c{color:#a0a6b8;font-weight:400;font-size:.75rem;margin-left:auto}
button.run{padding:10px 28px;background:#f0f1f4;color:#09090b;border:none;border-radius:8px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:1.5rem;transition:all .15s}
button.run:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,255,255,.08)}
button.run:disabled{opacity:.4;cursor:not-allowed;transform:none}
.progress-bar{width:100%;height:6px;background:#1c1f28;border-radius:3px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#4b8df8,#34c77b);border-radius:3px;transition:width .3s ease}
.status-line{font-size:.78rem;color:#a0a6b8;margin-bottom:12px;min-height:1.2em}
.status-line .elapsed{color:#636b82;margin-left:8px}
.status-line .err{color:#ef5050}
.log-section{margin-top:1.5rem;background:#0f1117;border:1px solid #2a2e3a;border-radius:10px;overflow:hidden}
.log-title{font-size:.72rem;font-weight:700;color:#636b82;padding:8px 12px;background:#16181f;border-bottom:1px solid #2a2e3a;letter-spacing:.05em;text-transform:uppercase}
.log-body{max-height:200px;overflow-y:auto;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:.7rem;line-height:1.7}
.log-body .log-entry{display:flex;gap:8px}
.log-body .log-ts{color:#636b82;flex-shrink:0}
.log-body .log-pass{color:#34c77b}
.log-body .log-fail{color:#ef5050}
.log-body .log-info{color:#a0a6b8}
.test-row .timer{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#636b82;min-width:45px;text-align:right}
iframe{display:none}
</style>
</head>
<body>
<h1>직장 선택 OS — 자동 시나리오 테스트</h1>
<div class="sub">브라우저에서 사용자 흐름을 자동으로 시뮬레이션합니다. iframe 안에서 index.html을 로드하고 DOM을 직접 조작합니다.</div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="status-line" id="statusLine">준비 완료 — 테스트 실행 버튼을 눌러주세요</div>
<button class="run" id="runBtn" onclick="runAll()">테스트 실행</button>
<div class="test-list" id="testList"></div>
<div class="summary" id="summary" style="display:none"></div>
<div class="log-section" id="logSection" style="display:none"><div class="log-title">실행 로그</div><div class="log-body" id="logBody"></div></div>
<iframe id="app" src="index.html"></iframe>

<script>
const tests=[];
let win,doc,logs=[];
let globalStart=0;

// ── Test registration ──
function test(name,fn){tests.push({name,fn,status:'pending',detail:'',ms:0})}

// ── Logging ──
function log(type,msg){
  const elapsed=globalStart?((performance.now()-globalStart)/1000).toFixed(1)+'s':'0.0s';
  logs.push({type,msg,elapsed});
  const body=document.getElementById('logBody');
  const section=document.getElementById('logSection');
  section.style.display='block';
  const cls=type==='pass'?'log-pass':type==='fail'?'log-fail':'log-info';
  body.innerHTML+=`<div class="log-entry"><span class="log-ts">[${elapsed}]</span><span class="${cls}">${msg}</span></div>`;
  body.scrollTop=body.scrollHeight;
}
function updateStatus(msg){document.getElementById('statusLine').innerHTML=msg}
function updateProgress(current,total){document.getElementById('progressFill').style.width=`${Math.round(current/total*100)}%`}

// ── Helpers ──
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function reset(){
  win=document.getElementById('app').contentWindow;
  doc=win.document;
}
function assert(cond,msg){if(!cond)throw new Error(msg||'Assertion failed')}
function assertEl(id,msg){const el=doc.getElementById(id);assert(el,msg||`Element #${id} not found`);return el}
function setSelect(id,val){const el=assertEl(id);el.value=val;el.dispatchEvent(new Event('change',{bubbles:true}))}
function setInput(id,val){const el=assertEl(id);el.value=val;el.dispatchEvent(new Event('input',{bubbles:true}))}
function clickBtn(selector){const el=doc.querySelector(selector);assert(el,`Button not found: ${selector}`);el.click()}

// ── Scenario setup helpers ──
function setupBasic(opts={}){
  // Navigate to input screen
  win.go('s-input');
  // Set priority
  win.setPri(opts.pri||'salary');
  if(opts.sac)win.setSacrifice(opts.sac);
  // Company A
  if(opts.compA){
    win.selComp('a',opts.compA);
  }else{
    setSelect('tA',opts.typeA||'large');
    win.onTypeChange('a');
  }
  // Salary
  setSelect('salA',opts.salA||'5000-6000');
  // Rate
  win.setRate(opts.rate!==undefined?opts.rate:10);
  // Company B
  if(opts.compB){
    win.selComp('b',opts.compB);
  }else{
    setSelect('tB',opts.typeB||'startup');
    win.onTypeChange('b');
  }
  // Commute
  if(opts.comA!==undefined)setInput('comA',opts.comA);
  if(opts.comB!==undefined)setInput('comB',opts.comB);
  // Work style overrides
  if(opts.wsA)Object.entries(opts.wsA).forEach(([k,v])=>win.setWS('a',k,v));
  if(opts.wsB)Object.entries(opts.wsB).forEach(([k,v])=>win.setWS('b',k,v));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TEST SCENARIOS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

test('DB 회사 선택 — CJ(현직) vs 토스(이직)', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:15,pri:'salary',sac:'wlb',comA:50,comB:30});
  assert(win.matched.a&&win.matched.a.id==='cj','CJ not matched');
  assert(win.matched.b&&win.matched.b.id==='toss','Toss not matched');
  assert(win.benS.a.length>0,'CJ benefits empty');
  assert(win.benS.b.length>0,'Toss benefits empty');
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.length>100,'Report not generated');
  assert(report.innerHTML.includes('보상 비교'),'Missing salary comparison');
  return `CJ 복지 ${win.benS.a.length}개, 토스 복지 ${win.benS.b.length}개, 리포트 생성 OK`;
});

test('수동 유형 선택 — 대기업 vs 스타트업', ()=>{
  setupBasic({typeA:'large',typeB:'startup',salA:'6000-7000',rate:20,pri:'salary',comA:60,comB:20});
  assert(!win.matched.a,'Should not be DB matched');
  assert(win.benS.a.length>0,'Preset benefits not loaded for large');
  assert(win.benS.b.length>0,'Preset benefits not loaded for startup');
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('보상 비교'),'Missing salary comparison');
  return `대기업 복지 ${win.benS.a.length}개, 스타트업 복지 ${win.benS.b.length}개`;
});

test('우선순위: 워라밸 — 근무방식 비교 포함', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:10,pri:'wlb',sac:'salary',comA:60,comB:25});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('근무방식 비교'),'WLB section missing');
  assert(report.innerHTML.includes('통근'),'Commute comparison missing');
  return 'WLB 비교 섹션 생성 OK';
});

test('우선순위: 고용 안정성', ()=>{
  setupBasic({typeA:'large',typeB:'startup',salA:'5000-6000',rate:15,pri:'stability',sac:'brand'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('고용 안정성'),'Stability section missing');
  assert(report.innerHTML.includes('85'),'Large company stability score missing');
  return '안정성 비교 OK (대기업 85 vs 스타트업 35)';
});

test('우선순위: 성장 기회', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:10,pri:'growth',sac:'benefits'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('성장 기회'),'Growth section missing');
  return '성장 기회 비교 OK';
});

test('우선순위: 복지', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:10,pri:'benefits',sac:'brand'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('복리후생 항목별 비교'),'Benefits table missing');
  return '복지 항목별 비교 테이블 OK';
});

test('우선순위: 회사 브랜드', ()=>{
  setupBasic({typeA:'large',typeB:'foreign',salA:'7000-8000',rate:5,pri:'brand',sac:'wlb'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('브랜드 가치'),'Brand section missing');
  return '브랜드 가치 섹션 OK';
});

test('포기 비용(Sacrifice) 카드 — 연봉 포기', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:15,pri:'wlb',sac:'salary'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('포기해도 괜찮을까'),'Sacrifice card missing');
  assert(report.innerHTML.includes('금전적 보상'),'Salary sacrifice label missing');
  return '포기 비용 카드 (연봉) OK';
});

test('3년 투영 — 성장률 반영', ()=>{
  setupBasic({typeA:'large',typeB:'startup',salA:'5000-6000',rate:10,pri:'salary'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('3년 후 기대 연봉'),'3yr projection missing');
  assert(report.innerHTML.includes('대기업 평균 4%'),'Growth rate label missing');
  assert(report.innerHTML.includes('스타트업 평균 10%'),'Startup growth rate missing');
  return '3년 투영 (대기업 4% vs 스타트업 10%) OK';
});

test('시간당 가치 — 포괄임금 경고', ()=>{
  setupBasic({typeA:'large',typeB:'startup',salA:'5000-6000',rate:10,pri:'salary',
    wsA:{ot:'mid',wage:'inclusive',remote:'partial',flex:'stagger'},
    wsB:{ot:'high',wage:'separate',remote:'hybrid',flex:'flexible'}});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('시간당 실질 가치'),'Hourly value section missing');
  assert(report.innerHTML.includes('포괄임금제'),'Inclusive wage warning missing');
  return '시간당 가치 + 포괄임금 경고 OK';
});

test('야근수당 계산 — 비포괄 vs 포괄', ()=>{
  setupBasic({typeA:'mid',typeB:'foreign',salA:'6000-7000',rate:10,pri:'salary',
    wsA:{ot:'high',wage:'separate',remote:'none',flex:'none'},
    wsB:{ot:'mid',wage:'inclusive',remote:'hybrid',flex:'flexible'}});
  const otA=win.getOTPay('a'), otB=win.getOTPay('b');
  assert(otA>0,'Separate wage should have OT pay');
  assert(otB===0,'Inclusive wage should have 0 OT pay');
  win.compare();
  return `비포괄 야근수당: ${otA}만, 포괄: ${otB}만`;
});

test('입력 누락 시 alert 방지 검증', ()=>{
  win.go('s-input');
  win.setPri('salary');
  // salA not set, should trigger alert
  let alertCalled=false;
  const origAlert=win.alert;
  win.alert=()=>{alertCalled=true};
  win.compare();
  win.alert=origAlert;
  assert(alertCalled,'Should alert when salary missing');
  return '입력 누락 시 alert 정상 작동';
});

test('실질 보상 실시간 계산 (calc)', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:10});
  win.calc();
  const tcbA=assertEl('tcbA').textContent;
  const tctA=assertEl('tctA').textContent;
  assert(tcbA.includes('5,000')||tcbA.includes('6,000'),'Salary A display wrong');
  assert(!tctA.includes('—'),'Total A should not be —');
  const diffV=assertEl('diffV').textContent;
  assert(diffV!=='—','Diff should be calculated');
  return `현직: ${tctA}, 차이: ${diffV}`;
});

test('공기업 vs 외국계 — 모든 유형 조합', ()=>{
  setupBasic({typeA:'public',typeB:'foreign',salA:'4000-5000',rate:5,pri:'stability',sac:'growth'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('고용 안정성'),'Stability missing');
  assert(report.innerHTML.includes('90'),'Public stability 90 missing');
  return '공기업(90) vs 외국계(60) 안정성 비교 OK';
});

test('복지 체크 해제 시 합산 제외', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:10,pri:'benefits'});
  const beforeTotal=win.getBenTotal('a').ben;
  // Uncheck first benefit
  win.togBen('a',0,false);
  const afterTotal=win.getBenTotal('a').ben;
  assert(afterTotal<beforeTotal,'Unchecking should reduce total');
  return `체크 해제 전: ${beforeTotal}만, 후: ${afterTotal}만`;
});

test('프리랜서 유형 — 낮은 안정성 + 자유 근무', ()=>{
  setupBasic({typeA:'freelance',typeB:'large',salA:'8000-9000',rate:0,pri:'wlb',sac:'stability',comA:0,comB:60});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('결론'),'Bottom line missing');
  return '프리랜서 vs 대기업 비교 OK';
});

test('profiler 결과 없이 비교 → profiler CTA 표시', ()=>{
  win.pfResult=null;
  setupBasic({typeA:'large',typeB:'startup',salA:'5000-6000',rate:10,pri:'salary'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('커리어 가치관 테스트'),'Profiler CTA missing when no pfResult');
  return 'profiler CTA 표시 OK';
});

test('동일 연봉 동결 — 복지만으로 차이 비교', ()=>{
  setupBasic({compA:'cj',compB:'toss',salA:'5000-6000',rate:0,pri:'benefits',sac:'salary'});
  win.compare();
  const report=assertEl('report');
  assert(report.innerHTML.includes('복리후생'),'Benefits comparison missing');
  const effDiff=assertEl('diffV').textContent;
  return `동결 시 차이: ${effDiff}`;
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TEST RUNNER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderList(){
  const el=document.getElementById('testList');
  el.innerHTML=tests.map((t,i)=>{
    const icon=t.status==='pass'?'✅':t.status==='fail'?'❌':t.status==='running'?'🔄':'⬜';
    const cls=t.status==='pending'?'':t.status;
    const timer=t.ms>0?`${t.ms}ms`:(t.status==='running'?'...':'');
    return `<div class="test-row ${cls}"><span class="icon">${icon}</span><span class="name">${i+1}. ${t.name}</span><span class="detail">${t.detail}</span><span class="timer">${timer}</span></div>`;
  }).join('');
}

async function runAll(){
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='실행 중...';
  globalStart=performance.now();
  let pass=0,fail=0;
  logs=[];
  document.getElementById('logBody').innerHTML='';
  document.getElementById('summary').style.display='none';
  tests.forEach(t=>{t.status='pending';t.detail='';t.ms=0});
  updateProgress(0,tests.length);

  log('info','테스트 시작 — iframe 로딩 대기 중...');
  updateStatus('iframe 로딩 중...');

  // Wait for iframe to load
  const iframe=document.getElementById('app');
  await new Promise(resolve=>{
    if(iframe.contentDocument?.readyState==='complete')resolve();
    else iframe.onload=resolve;
  });
  reset();

  // Timeout watchdog (30s total)
  const TIMEOUT=30000;
  let aborted=false;
  const watchdog=setTimeout(()=>{aborted=true},TIMEOUT);

  log('info',`iframe 로드 완료 — ${tests.length}개 테스트 시작`);
  renderList();

  for(let i=0;i<tests.length;i++){
    if(aborted){
      tests.slice(i).forEach(t=>{t.status='fail';t.detail='Timeout: 전체 30초 초과'});
      log('fail',`전체 타임아웃 (${TIMEOUT/1000}초) 초과 — 나머지 테스트 건너뜀`);
      fail+=tests.length-i;
      renderList();break;
    }
    const t=tests[i];
    t.status='running';t.detail='';
    const elapsed=((performance.now()-globalStart)/1000).toFixed(1);
    updateStatus(`[${i+1}/${tests.length}] <strong>${t.name}</strong> 실행 중... <span class="elapsed">${elapsed}s</span>`);
    updateProgress(i,tests.length);
    renderList();

    // Reload iframe for clean state each test
    if(i>0){
      iframe.src='index.html';
      await new Promise(r=>{
        const timer=setTimeout(()=>{r()},5000); // 5s per-load timeout
        iframe.onload=()=>{clearTimeout(timer);r()};
      });
      reset();
      await wait(50);
    }

    const tStart=performance.now();
    try{
      // Per-test timeout (5s)
      const result=await Promise.race([
        Promise.resolve().then(()=>t.fn()),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('이 테스트 5초 타임아웃')),5000))
      ]);
      t.ms=Math.round(performance.now()-tStart);
      t.status='pass';t.detail=result||'OK';pass++;
      log('pass',`#${i+1} ${t.name} — ${t.ms}ms — ${t.detail}`);
    }catch(e){
      t.ms=Math.round(performance.now()-tStart);
      t.status='fail';t.detail=e.message;fail++;
      log('fail',`#${i+1} ${t.name} — ${t.ms}ms — ${e.message}`);
    }
    renderList();
  }

  clearTimeout(watchdog);
  const totalElapsed=((performance.now()-globalStart)/1000).toFixed(1);
  updateProgress(tests.length,tests.length);

  const statusMsg=fail===0
    ?`✅ 전체 통과 (${tests.length}개, ${totalElapsed}초)`
    :`완료 — <span class="err">${fail}개 실패</span> / ${pass}개 통과 (${totalElapsed}초)`;
  updateStatus(statusMsg);
  log('info',`완료: ${pass} 통과, ${fail} 실패, ${totalElapsed}초`);

  const sumEl=document.getElementById('summary');
  sumEl.style.display='flex';
  sumEl.innerHTML=`<span>총 ${tests.length}개</span><span class="pass-c">✅ ${pass} 통과</span>${fail>0?`<span class="fail-c">❌ ${fail} 실패</span>`:''}<span class="time-c">${totalElapsed}초</span>`;
  btn.disabled=false;btn.textContent='다시 실행';
}

renderList();
</script>
</body>
</html>
