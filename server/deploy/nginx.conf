# P5-1 nginx site config — 개발 서버 (HTTP-only)
# 프로덕션 전환 시 follow-up: listen 443 ssl http2 + Let's Encrypt cert + HSTS 추가 + 80→443 redirect server 블록

server {
    listen 80;
    server_name _;

    # Frontend (static)
    root /home/ubuntu/job_change;
    index index.html;

    # gzip (런타임 + 사전압축)
    gzip on;
    gzip_static on;
    gzip_types text/css application/javascript application/json;
    gzip_vary on;
    gzip_min_length 512;

    # HTML: 항상 재검증 (배포 후 즉시 새 해시 참조)
    # 보안 헤더 3종은 각 location에 중복 선언 (nginx add_header는 가장 깊은 scope에서만 상속; HSTS는 HTTPS 전환 시 추가)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files /index.html =404;
    }

    # 해시 기반 정적 자산: 1년 immutable
    # expires 는 사용하지 않음 — 동시 사용 시 Cache-Control 헤더가 두 번 나옴
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # SPA fallback (존재 파일 → $uri, 없으면 index.html)
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
