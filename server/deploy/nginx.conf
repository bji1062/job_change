# P5-1 nginx site config — 프로덕션 (HTTPS, http2, HSTS)
# Cert: Let's Encrypt /etc/letsencrypt/live/loupit.co/ (loupit.co + www.loupit.co, 90일 자동갱신)

# ── HTTP :80 — ACME challenge 통과 + HTTPS 301 redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name loupit.co www.loupit.co;

    # Let's Encrypt webroot challenge — redirect보다 우선
    location ^~ /.well-known/acme-challenge/ {
        root /home/ubuntu/job_change;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name loupit.co www.loupit.co;

    # ── TLS (Mozilla Intermediate, ECDHE only — DHE/dhparam 의존 제거) ──
    ssl_certificate     /etc/letsencrypt/live/loupit.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loupit.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling 미사용 — Let's Encrypt가 2025년 OCSP 서비스 종료, 신규 인증서에 responder URL 없음

    # Frontend (static)
    root /home/ubuntu/job_change;
    index index.html;

    # gzip (런타임 + 사전압축)
    gzip on;
    gzip_static on;
    gzip_types text/css application/javascript application/json;
    gzip_vary on;
    gzip_min_length 512;

    # 보안 헤더 4종 — add_header는 가장 깊은 scope에서만 상속되므로 각 location마다 중복 선언
    # HSTS max-age=15768000 (6개월). 운영 안정 후 31536000+includeSubDomains+preload로 격상 권장
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        try_files /index.html =404;
    }

    # 해시 기반 정적 자산: 1년 immutable
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        access_log off;
    }

    # SPA fallback
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
