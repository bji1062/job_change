name: Deploy Main

on:
  push:
    branches:
      - main

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages preview folder
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: __gh_pages_old

      - name: Preserve preview directories
        run: |
          if [ -d "__gh_pages_old/preview" ]; then
            cp -r __gh_pages_old/preview ./preview
          fi
          rm -rf __gh_pages_old

      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: false
          exclude_assets: '.github'
